# Cryptex — Docker Compose for Dokploy + standalone hosts.
#
# This is THE compose file Dokploy uses. It's configured for Dokploy-first
# deployment (container on dokploy-network so Traefik can reach it).
#
# DOKPLOY (primary target):
#   1. Add this repo as a Docker Compose application in the Dokploy UI.
#   2. Set Build Variables: PUBLIC_ADSENSE_CLIENT (optional), BASE_PATH (optional).
#   3. In the Dokploy "Domains" tab, add your domain. Host: <your-domain>.
#      Container Port: 80. Enable HTTPS with Let's Encrypt.
#   4. Deploy. The container joins `dokploy-network` and Traefik handles routing.
#
# STANDALONE (local dev, VPS without Dokploy):
#   Run the one-liner from DEPLOY.md — it wraps `docker build` + `docker run`.
#   This compose file won't work standalone because it depends on the
#   external `dokploy-network`.

services:
  cryptex:
    container_name: cryptex
    image: cryptex:latest
    restart: unless-stopped

    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: "${BASE_PATH:-}"
        PUBLIC_ADSENSE_CLIENT: "${PUBLIC_ADSENSE_CLIENT:-}"

    environment:
      TZ: "${TZ:-UTC}"

    # `expose` makes port 80 reachable by other services on the same Docker
    # network (including Dokploy's Traefik). No host port is published.
    expose:
      - "80"

    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      # Provisioned by Dokploy's installer. Traefik runs on this network and
      # can only route to services that are on it too.
      - dokploy-network

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 32M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    labels:
      - "org.opencontainers.image.title=Cryptex"
      - "org.opencontainers.image.description=AI red-teamer's text lab — 162 transforms, steganography, BYOK AI rewrites."
      - "org.opencontainers.image.source=https://github.com/m4xx101/cryptex"
      - "org.opencontainers.image.licenses=MIT"
      # Dokploy generates traefik.* labels automatically based on the Domains
      # you configure in the UI. Only uncomment these if you want to pin
      # routing in-repo (replace cryptex.your-domain.com with your host):
      # - "traefik.enable=true"
      # - "traefik.docker.network=dokploy-network"
      # - "traefik.http.routers.cryptex.rule=Host(`cryptex.your-domain.com`)"
      # - "traefik.http.routers.cryptex.entrypoints=websecure"
      # - "traefik.http.routers.cryptex.tls=true"
      # - "traefik.http.routers.cryptex.tls.certresolver=letsencrypt"
      # - "traefik.http.services.cryptex.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
