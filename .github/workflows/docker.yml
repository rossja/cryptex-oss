name: Docker build

# Strategy: publish linux/amd64 unconditionally (the most common arch for
# self-hosters on VPS), then attempt linux/arm64 as a best-effort multi-arch
# manifest. If arm64 emulation cannot be installed, the workflow still
# leaves a working amd64 image at every tag.
#
# QEMU setup uses tonistiigi/binfmt directly (a docker run) instead of the
# docker/setup-qemu-action wrapper. The wrapper has hit transient
# codeload.github.com download failures that cannot be tolerated with
# step-level continue-on-error because action archives download before any
# step runs. tonistiigi/binfmt comes from Docker Hub (separate CDN) so it
# routes around codeload outages entirely.

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*']
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'app/**'
      - 'src/transformers/**'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'app/**'
      - 'src/transformers/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU enables linux/arm64 cross-build on the amd64 runner. We install
      # via tonistiigi/binfmt direct from Docker Hub (the docker/setup-qemu-action
      # wrapper has hit transient codeload.github.com 500s). If the binfmt
      # install fails (e.g. Docker Hub rate-limit), the next "Resolve build
      # platforms" step falls back to amd64-only.
      - name: Install QEMU emulators (binfmt)
        id: qemu
        continue-on-error: true
        run: docker run --privileged --rm tonistiigi/binfmt:latest --install arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/m4xx101/cryptex-oss
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      # Pick the platform set based on whether QEMU came up. Always publish
      # amd64; only include arm64 if QEMU succeeded.
      - name: Resolve build platforms
        id: platforms
        run: |
          if [ "${{ steps.qemu.outcome }}" = "success" ]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
            echo "QEMU ready — building multi-arch (amd64 + arm64)."
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
            echo "::warning::QEMU setup failed; publishing linux/amd64 only. arm64 will catch up on the next run."
          fi

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: ${{ steps.platforms.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build single-arch image for local smoke test
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: cryptex:ci
          cache-from: type=gha

      - name: Smoke-test the container
        run: |
          # Start, wait for health, probe the routes, stop.
          docker run -d --name cryptex-ci -p 8080:80 cryptex:ci
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            sleep 1
          done
          echo "--- routes ---"
          curl -s -o /dev/null -w "%{http_code}  /\n"             http://localhost:8080/
          curl -s -o /dev/null -w "%{http_code}  /transforms/\n"  http://localhost:8080/transforms/
          curl -s -o /dev/null -w "%{http_code}  /decode/\n"      http://localhost:8080/decode/
          curl -s -o /dev/null -w "%{http_code}  /emoji/\n"       http://localhost:8080/emoji/
          curl -s -o /dev/null -w "%{http_code}  /settings/\n"    http://localhost:8080/settings/
          docker logs cryptex-ci | tail -20
          docker stop cryptex-ci && docker rm cryptex-ci

      - name: Publish summary
        if: always()
        run: |
          echo "## Docker build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Platforms attempted: \`${{ steps.platforms.outputs.value }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.qemu.outcome }}" != "success" ]; then
            echo "- ⚠️  QEMU setup failed; arm64 was skipped this run." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Image tags pushed (if not PR): \`${{ steps.meta.outputs.tags }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull from a clean machine:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo 'docker run -d --name cryptex --restart unless-stopped \' >> "$GITHUB_STEP_SUMMARY"
          echo '  -p 8080:80 ghcr.io/m4xx101/cryptex-oss:latest' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
