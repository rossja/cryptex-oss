name: Docker build

on:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'app/**'
      - 'src/transformers/**'
      - '.github/workflows/docker.yml'
  pull_request:
    paths:
      - 'Dockerfile'
      - 'nginx.conf'
      - 'app/**'
      - 'src/transformers/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: cryptex:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container
        run: |
          # Start, wait for health, probe the routes, stop.
          docker run -d --name cryptex-ci -p 8080:80 cryptex:ci
          for i in {1..30}; do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            sleep 1
          done
          echo "--- routes ---"
          curl -s -o /dev/null -w "%{http_code}  /\n"             http://localhost:8080/
          curl -s -o /dev/null -w "%{http_code}  /transforms/\n"  http://localhost:8080/transforms/
          curl -s -o /dev/null -w "%{http_code}  /decode/\n"      http://localhost:8080/decode/
          curl -s -o /dev/null -w "%{http_code}  /emoji/\n"       http://localhost:8080/emoji/
          curl -s -o /dev/null -w "%{http_code}  /settings/\n"    http://localhost:8080/settings/
          docker logs cryptex-ci | tail -20
          docker stop cryptex-ci && docker rm cryptex-ci
